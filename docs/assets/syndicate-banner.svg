<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" width="1200" height="280">
  <defs>
    <!-- Background gradient: deep space black to dark slate -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060a0f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#060a0f;stop-opacity:1" />
    </linearGradient>

    <!-- Accent glow: electric cyan -->
    <radialGradient id="glowCenter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0" />
    </radialGradient>

    <!-- Left node glow -->
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.8" />
      <stop offset="60%" style="stop-color:#0066ff;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#0066ff;stop-opacity:0" />
    </radialGradient>

    <!-- Icon hex gradient -->
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066ff;stop-opacity:1" />
    </linearGradient>

    <!-- Text gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#e8f4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a0d4ff;stop-opacity:1" />
    </linearGradient>

    <!-- Accent line gradient -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0" />
      <stop offset="20%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="80%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0" />
    </linearGradient>

    <!-- Circuit grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a2a3a" stroke-width="0.5" opacity="0.6"/>
    </pattern>

    <!-- Glow filter for icon -->
    <filter id="iconGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft glow filter for text -->
    <filter id="textGlow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip path for rounded card -->
    <clipPath id="cardClip">
      <rect width="1200" height="280" rx="12"/>
    </clipPath>
  </defs>

  <!-- Outer card with rounded corners -->
  <rect width="1200" height="280" rx="12" fill="url(#bgGrad)"/>

  <!-- Clipped content -->
  <g clip-path="url(#cardClip)">

    <!-- Grid background texture -->
    <rect width="1200" height="280" fill="url(#grid)"/>

    <!-- Central ambient glow -->
    <ellipse cx="600" cy="140" rx="500" ry="180" fill="url(#glowCenter)"/>

    <!-- Left decorative circuit lines -->
    <g opacity="0.25" stroke="#00d4ff" stroke-width="1" fill="none">
      <line x1="0" y1="80" x2="120" y2="80"/>
      <line x1="120" y1="80" x2="140" y2="100"/>
      <line x1="140" y1="100" x2="140" y2="180"/>
      <line x1="140" y1="180" x2="120" y2="200"/>
      <line x1="120" y1="200" x2="0" y2="200"/>
      <circle cx="120" cy="80" r="3" fill="#00d4ff"/>
      <circle cx="140" cy="140" r="2" fill="#00d4ff"/>
      <circle cx="120" cy="200" r="3" fill="#00d4ff"/>
      <!-- Horizontal branches -->
      <line x1="0" y1="120" x2="80" y2="120"/>
      <line x1="80" y1="120" x2="90" y2="130"/>
      <line x1="0" y1="160" x2="80" y2="160"/>
      <line x1="80" y1="160" x2="90" y2="150"/>
      <circle cx="80" cy="120" r="2" fill="#0066ff"/>
      <circle cx="80" cy="160" r="2" fill="#0066ff"/>
    </g>

    <!-- Right decorative circuit lines -->
    <g opacity="0.25" stroke="#00d4ff" stroke-width="1" fill="none">
      <line x1="1200" y1="80" x2="1080" y2="80"/>
      <line x1="1080" y1="80" x2="1060" y2="100"/>
      <line x1="1060" y1="100" x2="1060" y2="180"/>
      <line x1="1060" y1="180" x2="1080" y2="200"/>
      <line x1="1080" y1="200" x2="1200" y2="200"/>
      <circle cx="1080" cy="80" r="3" fill="#00d4ff"/>
      <circle cx="1060" cy="140" r="2" fill="#00d4ff"/>
      <circle cx="1080" cy="200" r="3" fill="#00d4ff"/>
      <line x1="1200" y1="120" x2="1120" y2="120"/>
      <line x1="1120" y1="120" x2="1110" y2="130"/>
      <line x1="1200" y1="160" x2="1120" y2="160"/>
      <line x1="1120" y1="160" x2="1110" y2="150"/>
      <circle cx="1120" cy="120" r="2" fill="#0066ff"/>
      <circle cx="1120" cy="160" r="2" fill="#0066ff"/>
    </g>

    <!-- DAG node decorations — left cluster -->
    <g opacity="0.5">
      <circle cx="45" cy="140" r="5" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
      <circle cx="45" cy="140" r="2" fill="#00d4ff"/>
      <circle cx="20" cy="110" r="3" fill="none" stroke="#0066ff" stroke-width="1"/>
      <circle cx="20" cy="110" r="1.2" fill="#0066ff"/>
      <circle cx="20" cy="170" r="3" fill="none" stroke="#0066ff" stroke-width="1"/>
      <circle cx="20" cy="170" r="1.2" fill="#0066ff"/>
      <line x1="23" y1="112" x2="40" y2="136" stroke="#0066ff" stroke-width="0.8" opacity="0.6"/>
      <line x1="23" y1="168" x2="40" y2="144" stroke="#0066ff" stroke-width="0.8" opacity="0.6"/>
    </g>

    <!-- DAG node decorations — right cluster -->
    <g opacity="0.5">
      <circle cx="1155" cy="140" r="5" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
      <circle cx="1155" cy="140" r="2" fill="#00d4ff"/>
      <circle cx="1180" cy="110" r="3" fill="none" stroke="#0066ff" stroke-width="1"/>
      <circle cx="1180" cy="110" r="1.2" fill="#0066ff"/>
      <circle cx="1180" cy="170" r="3" fill="none" stroke="#0066ff" stroke-width="1"/>
      <circle cx="1180" cy="170" r="1.2" fill="#0066ff"/>
      <line x1="1177" y1="112" x2="1160" y2="136" stroke="#0066ff" stroke-width="0.8" opacity="0.6"/>
      <line x1="1177" y1="168" x2="1160" y2="144" stroke="#0066ff" stroke-width="0.8" opacity="0.6"/>
    </g>

    <!-- ── ICON: Hexagonal network mark ─────────────────────────────── -->
    <!-- Outer glow pulse ring -->
    <circle cx="240" cy="140" r="56" fill="none" stroke="#00d4ff" stroke-width="0.5" opacity="0.3"/>
    <circle cx="240" cy="140" r="48" fill="none" stroke="#00d4ff" stroke-width="0.8" opacity="0.2"/>

    <!-- Hexagon background -->
    <polygon points="240,90 283,115 283,165 240,190 197,165 197,115"
             fill="#0a1628" stroke="url(#hexGrad)" stroke-width="1.5" opacity="0.9"/>

    <!-- Inner hex fill -->
    <polygon points="240,98 276,118 276,162 240,182 204,162 204,118"
             fill="none" stroke="#00d4ff" stroke-width="0.5" opacity="0.3"/>

    <!-- Network nodes inside hex -->
    <!-- Central node -->
    <circle cx="240" cy="140" r="7" fill="url(#hexGrad)" filter="url(#iconGlow)"/>

    <!-- Outer ring nodes -->
    <circle cx="240" cy="112" r="4.5" fill="#0066ff" opacity="0.9"/>
    <circle cx="262" cy="125" r="4.5" fill="#0066ff" opacity="0.9"/>
    <circle cx="262" cy="155" r="4.5" fill="#0066ff" opacity="0.9"/>
    <circle cx="240" cy="168" r="4.5" fill="#0066ff" opacity="0.9"/>
    <circle cx="218" cy="155" r="4.5" fill="#0066ff" opacity="0.9"/>
    <circle cx="218" cy="125" r="4.5" fill="#0066ff" opacity="0.9"/>

    <!-- Connection lines from center -->
    <g stroke="#00d4ff" stroke-width="1.2" opacity="0.7">
      <line x1="240" y1="133" x2="240" y2="116"/>
      <line x1="246" y1="136" x2="258" y2="129"/>
      <line x1="246" y1="144" x2="258" y2="151"/>
      <line x1="240" y1="147" x2="240" y2="164"/>
      <line x1="234" y1="144" x2="222" y2="151"/>
      <line x1="234" y1="136" x2="222" y2="129"/>
    </g>

    <!-- Outer ring connections -->
    <g stroke="#0066ff" stroke-width="0.8" opacity="0.4">
      <line x1="240" y1="112" x2="262" y2="125"/>
      <line x1="262" y1="125" x2="262" y2="155"/>
      <line x1="262" y1="155" x2="240" y2="168"/>
      <line x1="240" y1="168" x2="218" y2="155"/>
      <line x1="218" y1="155" x2="218" y2="125"/>
      <line x1="218" y1="125" x2="240" y2="112"/>
    </g>

    <!-- ── WORDMARK ────────────────────────────────────────────────── -->

    <!-- S Y N D I C A T E -->
    <text x="315" y="118" font-family="'Courier New', 'SF Mono', monospace"
          font-size="11" font-weight="400" letter-spacing="6"
          fill="#00d4ff" opacity="0.7">SYNDICATE</text>

    <!-- Main title -->
    <text x="312" y="175" font-family="'Courier New', 'SF Mono', monospace"
          font-size="72" font-weight="700" letter-spacing="-1"
          fill="url(#textGrad)" filter="url(#textGlow)">AI</text>

    <!-- Vertical divider -->
    <rect x="414" y="92" width="1.5" height="96" fill="#00d4ff" opacity="0.4"/>

    <!-- Right-side descriptor block -->
    <text x="432" y="123" font-family="'Courier New', 'SF Mono', monospace"
          font-size="13" font-weight="400" letter-spacing="2"
          fill="#a0d4ff" opacity="0.85">DETERMINISTIC</text>
    <text x="432" y="144" font-family="'Courier New', 'SF Mono', monospace"
          font-size="13" font-weight="400" letter-spacing="2"
          fill="#a0d4ff" opacity="0.85">MULTI-AGENT</text>
    <text x="432" y="165" font-family="'Courier New', 'SF Mono', monospace"
          font-size="13" font-weight="400" letter-spacing="2"
          fill="#00d4ff" opacity="1">ORCHESTRATION</text>

    <!-- ── BOTTOM STATS BAR ─────────────────────────────────────────── -->
    <!-- Separator line -->
    <rect x="180" y="208" width="840" height="1" fill="url(#lineGrad)" opacity="0.6"/>

    <!-- Stat pills -->
    <!-- 100+ Agents -->
    <rect x="270" y="220" width="130" height="26" rx="4" fill="#0d1e35" stroke="#00d4ff" stroke-width="0.8" opacity="0.9"/>
    <text x="335" y="237" font-family="'Courier New', 'SF Mono', monospace"
          font-size="10" font-weight="500" fill="#00d4ff" text-anchor="middle" letter-spacing="1">100+ AGENTS</text>

    <!-- Typed I/O -->
    <rect x="418" y="220" width="130" height="26" rx="4" fill="#0d1e35" stroke="#0066ff" stroke-width="0.8" opacity="0.9"/>
    <text x="483" y="237" font-family="'Courier New', 'SF Mono', monospace"
          font-size="10" font-weight="500" fill="#6ab0ff" text-anchor="middle" letter-spacing="1">TYPED I/O</text>

    <!-- DAG Execution -->
    <rect x="566" y="220" width="150" height="26" rx="4" fill="#0d1e35" stroke="#0066ff" stroke-width="0.8" opacity="0.9"/>
    <text x="641" y="237" font-family="'Courier New', 'SF Mono', monospace"
          font-size="10" font-weight="500" fill="#6ab0ff" text-anchor="middle" letter-spacing="1">DAG EXECUTION</text>

    <!-- Production Grade -->
    <rect x="734" y="220" width="160" height="26" rx="4" fill="#0d1e35" stroke="#0066ff" stroke-width="0.8" opacity="0.9"/>
    <text x="814" y="237" font-family="'Courier New', 'SF Mono', monospace"
          font-size="10" font-weight="500" fill="#6ab0ff" text-anchor="middle" letter-spacing="1">PRODUCTION-GRADE</text>

    <!-- Corner accent dots -->
    <circle cx="170" cy="140" r="3" fill="#00d4ff" opacity="0.4"/>
    <circle cx="1030" cy="140" r="3" fill="#00d4ff" opacity="0.4"/>

    <!-- Border frame -->
    <rect width="1200" height="280" rx="12" fill="none" stroke="#1a3050" stroke-width="1.5"/>

    <!-- Top accent line -->
    <rect x="0" y="0" width="1200" height="2" rx="0" fill="url(#lineGrad)" opacity="0.5"/>

  </g>
</svg>
