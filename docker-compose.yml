# ═══════════════════════════════════════════════════════════════════════════
# SYNDICATE AI — Docker Compose Stack
# Services: api · worker · postgres · redis · grafana · prometheus
# ═══════════════════════════════════════════════════════════════════════════

name: syndicate-ai

x-common-env: &common-env
  env_file: .env
  environment:
    - PYTHONPATH=/app/src

x-depends-on-infra: &depends-on-infra
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:

  # ─── API Server ──────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    <<: [*common-env, *depends-on-infra]
    ports:
      - "8000:8000"
    volumes:
      - ./agents:/app/agents:ro
      - ./workflows:/app/workflows:ro
    command: >
      uvicorn syndicate.api.main:app
      --host 0.0.0.0 --port 8000 --workers 2
      --log-config /app/src/syndicate/logging.json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - "prometheus.io/scrape=true"
      - "prometheus.io/path=/metrics"
      - "prometheus.io/port=8000"

  # ─── Celery Worker ───────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    <<: [*common-env, *depends-on-infra]
    volumes:
      - ./agents:/app/agents:ro
      - ./workflows:/app/workflows:ro
    command: >
      celery -A syndicate.execution.celery_app worker
      --loglevel=info --concurrency=4
      --queues=default,priority
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "celery", "-A", "syndicate.execution.celery_app", "inspect", "ping"]
      interval: 60s
      timeout: 30s
      retries: 3

  # ─── Celery Beat (Scheduler) ─────────────────────────────────────────────
  beat:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    <<: [*common-env, *depends-on-infra]
    command: >
      celery -A syndicate.execution.celery_app beat
      --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    restart: unless-stopped

  # ─── Flower (Celery Monitor) ─────────────────────────────────────────────
  flower:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    <<: [*common-env, *depends-on-infra]
    ports:
      - "5555:5555"
    command: >
      celery -A syndicate.execution.celery_app flower
      --port=5555 --basic-auth=admin:change-me
    restart: unless-stopped

  # ─── PostgreSQL ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-syndicate}
      POSTGRES_USER: ${POSTGRES_USER:-syndicate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-in-production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-syndicate}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Prometheus ──────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.55.1
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    restart: unless-stopped

  # ─── Grafana ─────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.4.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./deploy/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  default:
    name: syndicate-network
