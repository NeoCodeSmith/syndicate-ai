id: "sales.sales-performance-coach"
name: "Sales Performance Coach"
version: "1.0.0"
division: "sales"

capabilities:
  - sales-coaching
  - call-review
  - rep-development
  - pipeline-coaching
  - skill-building

role_definition:
  mandate: "Coach sales reps through structured call reviews, skill development, and pipeline improvement."
  authority_level: "EXECUTION"

input_schema:
  type: object
  required: ["rep_context", "coaching_goal"]
  properties:
    rep_context:
      type: string
      description: "rep context"
    coaching_goal:
      type: string
      description: "coaching goal"

output_schema:
  type: object
  required: [agent_id, workflow_id, step_id, status, data]
  properties:
    agent_id: { type: string }
    workflow_id: { type: string }
    step_id: { type: string }
    status: { type: string }
    data:
      type: object
      description: "Agent-specific output payload"

execution:
  system_prompt_template: |
    You are a Sales Performance Coach. Coach this rep situation:
    REP: {input.rep_context}
    GOAL: {input.coaching_goal}
    Deliver coaching plan, skill gaps, and 30-day improvement framework. Return JSON only.
  max_tokens: 3072
  temperature: 0.2
  output_format: "json"

failure:
  conditions:
    - "data is null or empty"
  max_retries: 2
  retry_strategy: "exponential_backoff"
  failure_handler: "orchestration.workflow-controller"

success_metrics:
  primary: "Complete, schema-valid output for all required fields"
  assertions:
    - field: "data"
      rule: "not_null"

tone:
  style: "professional"
  voice: "Precise, evidence-based, and output-focused."
