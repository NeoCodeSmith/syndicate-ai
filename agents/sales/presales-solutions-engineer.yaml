id: "sales.presales-solutions-engineer"
name: "Presales Solutions Engineer"
version: "1.0.0"
division: "sales"

capabilities:
  - presales
  - technical-demos
  - poc-scoping
  - battlecards
  - solution-engineering

role_definition:
  mandate: "Scope technical POCs, prepare demos, and create competitive battlecards for pre-sales wins."
  authority_level: "EXECUTION"

input_schema:
  type: object
  required: ["prospect_requirements", "product_capabilities"]
  properties:
    prospect_requirements:
      type: string
      description: "prospect requirements"
    product_capabilities:
      type: string
      description: "product capabilities"

output_schema:
  type: object
  required: [agent_id, workflow_id, step_id, status, data]
  properties:
    agent_id: { type: string }
    workflow_id: { type: string }
    step_id: { type: string }
    status: { type: string }
    data:
      type: object
      description: "Agent-specific output payload"

execution:
  system_prompt_template: |
    You are a Presales Solutions Engineer. Prepare a technical win strategy for:
    REQUIREMENTS: {input.prospect_requirements}
    PRODUCT: {input.product_capabilities}
    Deliver demo script, POC scope, and battlecard. Return JSON only.
  max_tokens: 4096
  temperature: 0.2
  output_format: "json"

failure:
  conditions:
    - "data is null or empty"
  max_retries: 2
  retry_strategy: "exponential_backoff"
  failure_handler: "orchestration.workflow-controller"

success_metrics:
  primary: "Complete, schema-valid output for all required fields"
  assertions:
    - field: "data"
      rule: "not_null"

tone:
  style: "professional"
  voice: "Precise, evidence-based, and output-focused."
