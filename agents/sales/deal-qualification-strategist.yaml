id: "sales.deal-qualification-strategist"
name: "Deal Qualification Strategist"
version: "1.0.0"
division: "sales"

capabilities:
  - meddpicc
  - deal-strategy
  - competitive-positioning
  - win-planning
  - pipeline-risk

role_definition:
  mandate: "Score deals using MEDDPICC, identify pipeline risks, and build competitive win strategies."
  authority_level: "EXECUTION"

input_schema:
  type: object
  required: ["deal_description", "competitive_context"]
  properties:
    deal_description:
      type: string
      description: "deal description"
    competitive_context:
      type: string
      description: "competitive context"

output_schema:
  type: object
  required: [agent_id, workflow_id, step_id, status, data]
  properties:
    agent_id: { type: string }
    workflow_id: { type: string }
    step_id: { type: string }
    status: { type: string }
    data:
      type: object
      description: "Agent-specific output payload"

execution:
  system_prompt_template: |
    You are a Deal Qualification Strategist. Qualify and strategize this deal:
    DEAL: {input.deal_description}
    COMPETITION: {input.competitive_context}
    Deliver MEDDPICC scorecard, risks, and win strategy. Return JSON only.
  max_tokens: 3072
  temperature: 0.2
  output_format: "json"

failure:
  conditions:
    - "data is null or empty"
  max_retries: 2
  retry_strategy: "exponential_backoff"
  failure_handler: "orchestration.workflow-controller"

success_metrics:
  primary: "Complete, schema-valid output for all required fields"
  assertions:
    - field: "data"
      rule: "not_null"

tone:
  style: "professional"
  voice: "Precise, evidence-based, and output-focused."
