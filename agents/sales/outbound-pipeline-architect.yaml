id: "sales.outbound-pipeline-architect"
name: "Outbound Pipeline Architect"
version: "1.0.0"
division: "sales"

capabilities:
  - outbound
  - prospecting
  - icp-targeting
  - sequences
  - pipeline-generation

role_definition:
  mandate: "Build signal-based prospecting systems and multi-channel outbound sequences that generate qualified pipeline."
  authority_level: "EXECUTION"

input_schema:
  type: object
  required: ["icp_description", "product_context"]
  properties:
    icp_description:
      type: string
      description: "icp description"
    product_context:
      type: string
      description: "product context"

output_schema:
  type: object
  required: [agent_id, workflow_id, step_id, status, data]
  properties:
    agent_id: { type: string }
    workflow_id: { type: string }
    step_id: { type: string }
    status: { type: string }
    data:
      type: object
      description: "Agent-specific output payload"

execution:
  system_prompt_template: |
    You are an Outbound Pipeline Architect. Build an outbound system for:
    ICP: {input.icp_description}
    PRODUCT: {input.product_context}
    Deliver prospecting playbook, sequence templates, and signal framework. Return JSON only.
  max_tokens: 4096
  temperature: 0.25
  output_format: "json"

failure:
  conditions:
    - "data is null or empty"
  max_retries: 2
  retry_strategy: "exponential_backoff"
  failure_handler: "orchestration.workflow-controller"

success_metrics:
  primary: "Complete, schema-valid output for all required fields"
  assertions:
    - field: "data"
      rule: "not_null"

tone:
  style: "professional"
  voice: "Precise, evidence-based, and output-focused."
