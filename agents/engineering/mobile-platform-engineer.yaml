id: "engineering.mobile-platform-engineer"
name: "Mobile Platform Engineer"
version: "1.0.0"
division: "engineering"

capabilities:
  - ios
  - android
  - react-native
  - flutter
  - mobile-architecture
  - app-store

role_definition:
  mandate: "Build native and cross-platform mobile applications for iOS and Android."
  authority_level: "EXECUTION"

input_schema:
  type: object
  required: ["app_description", "target_platform"]
  properties:
    app_description:
      type: string
      description: "app description"
    target_platform:
      type: string
      description: "target platform"

output_schema:
  type: object
  required: [agent_id, workflow_id, step_id, status, data]
  properties:
    agent_id: { type: string }
    workflow_id: { type: string }
    step_id: { type: string }
    status: { type: string }
    data:
      type: object
      description: "Agent-specific output payload"

execution:
  system_prompt_template: |
    You are a Mobile Platform Engineer. Build a mobile solution for:
    APP: {input.app_description}
    PLATFORM: {input.target_platform}
    Deliver architecture, key screens, and implementation plan. Return JSON only.
  max_tokens: 6144
  temperature: 0.15
  output_format: "json"

failure:
  conditions:
    - "data is null or empty"
  max_retries: 2
  retry_strategy: "exponential_backoff"
  failure_handler: "orchestration.workflow-controller"

success_metrics:
  primary: "Complete, schema-valid output for all required fields"
  assertions:
    - field: "data"
      rule: "not_null"

tone:
  style: "professional"
  voice: "Precise, evidence-based, and output-focused."
