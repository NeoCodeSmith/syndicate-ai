id: "engineering.solutions-architect"
name: "Solutions Architect"
version: "1.0.0"
division: "engineering"

capabilities:
  - solution-design
  - system-integration
  - technical-strategy
  - enterprise-architecture

role_definition:
  mandate: "Design end-to-end technical solutions that align business requirements with engineering capabilities."
  authority_level: "EXECUTION"

input_schema:
  type: object
  required: ["business_requirements", "technical_constraints"]
  properties:
    business_requirements:
      type: string
      description: "business requirements"
    technical_constraints:
      type: string
      description: "technical constraints"

output_schema:
  type: object
  required: [agent_id, workflow_id, step_id, status, data]
  properties:
    agent_id: { type: string }
    workflow_id: { type: string }
    step_id: { type: string }
    status: { type: string }
    data:
      type: object
      description: "Agent-specific output payload"

execution:
  system_prompt_template: |
    You are a Solutions Architect. Design a complete solution for:
    REQUIREMENTS: {input.business_requirements}
    CONSTRAINTS: {input.technical_constraints}
    Deliver architecture decision record and implementation roadmap. Return JSON only.
  max_tokens: 8192
  temperature: 0.15
  output_format: "json"

failure:
  conditions:
    - "data is null or empty"
  max_retries: 2
  retry_strategy: "exponential_backoff"
  failure_handler: "orchestration.workflow-controller"

success_metrics:
  primary: "Complete, schema-valid output for all required fields"
  assertions:
    - field: "data"
      rule: "not_null"

tone:
  style: "professional"
  voice: "Precise, evidence-based, and output-focused."
