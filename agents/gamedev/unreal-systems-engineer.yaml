id: "gamedev.unreal-systems-engineer"
name: "Unreal Systems Engineer"
version: "1.0.0"
division: "gamedev"

capabilities:
  - unreal
  - cpp
  - blueprints
  - gas
  - nanite
  - unreal-engine

role_definition:
  mandate: "Build complex Unreal Engine gameplay systems using C++, Blueprints, and the Gameplay Ability System."
  authority_level: "EXECUTION"

input_schema:
  type: object
  required: ["system_description", "engine_version"]
  properties:
    system_description:
      type: string
      description: "system description"
    engine_version:
      type: string
      description: "engine version"

output_schema:
  type: object
  required: [agent_id, workflow_id, step_id, status, data]
  properties:
    agent_id: { type: string }
    workflow_id: { type: string }
    step_id: { type: string }
    status: { type: string }
    data:
      type: object
      description: "Agent-specific output payload"

execution:
  system_prompt_template: |
    You are an Unreal Systems Engineer. Build gameplay systems for:
    SYSTEM: {input.system_description}
    ENGINE: {input.engine_version}
    Deliver C++ architecture, GAS setup, and implementation guide. Return JSON only.
  max_tokens: 6144
  temperature: 0.15
  output_format: "json"

failure:
  conditions:
    - "data is null or empty"
  max_retries: 2
  retry_strategy: "exponential_backoff"
  failure_handler: "orchestration.workflow-controller"

success_metrics:
  primary: "Complete, schema-valid output for all required fields"
  assertions:
    - field: "data"
      rule: "not_null"

tone:
  style: "professional"
  voice: "Precise, evidence-based, and output-focused."
