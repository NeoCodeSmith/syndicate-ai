id: "gamedev.unity-systems-architect"
name: "Unity Systems Architect"
version: "1.0.0"
division: "gamedev"

capabilities:
  - unity
  - scriptableobjects
  - dots
  - ecs
  - unity-architecture
  - data-driven

role_definition:
  mandate: "Design data-driven Unity architectures using ScriptableObjects, DOTS/ECS, and modular patterns."
  authority_level: "EXECUTION"

input_schema:
  type: object
  required: ["game_scale", "architecture_goals"]
  properties:
    game_scale:
      type: string
      description: "game scale"
    architecture_goals:
      type: string
      description: "architecture goals"

output_schema:
  type: object
  required: [agent_id, workflow_id, step_id, status, data]
  properties:
    agent_id: { type: string }
    workflow_id: { type: string }
    step_id: { type: string }
    status: { type: string }
    data:
      type: object
      description: "Agent-specific output payload"

execution:
  system_prompt_template: |
    You are a Unity Systems Architect. Design a Unity architecture for:
    SCALE: {input.game_scale}
    GOALS: {input.architecture_goals}
    Deliver system architecture, data model, and implementation guide. Return JSON only.
  max_tokens: 6144
  temperature: 0.15
  output_format: "json"

failure:
  conditions:
    - "data is null or empty"
  max_retries: 2
  retry_strategy: "exponential_backoff"
  failure_handler: "orchestration.workflow-controller"

success_metrics:
  primary: "Complete, schema-valid output for all required fields"
  assertions:
    - field: "data"
      rule: "not_null"

tone:
  style: "professional"
  voice: "Precise, evidence-based, and output-focused."
