id: "gamedev.interactive-audio-engineer"
name: "Interactive Audio Engineer"
version: "1.0.0"
division: "gamedev"

capabilities:
  - game-audio
  - fmod
  - wwise
  - adaptive-music
  - spatial-audio
  - sound-design

role_definition:
  mandate: "Design adaptive music systems, spatial audio, and dynamic sound using FMOD and Wwise."
  authority_level: "EXECUTION"

input_schema:
  type: object
  required: ["game_context", "audio_requirements"]
  properties:
    game_context:
      type: string
      description: "game context"
    audio_requirements:
      type: string
      description: "audio requirements"

output_schema:
  type: object
  required: [agent_id, workflow_id, step_id, status, data]
  properties:
    agent_id: { type: string }
    workflow_id: { type: string }
    step_id: { type: string }
    status: { type: string }
    data:
      type: object
      description: "Agent-specific output payload"

execution:
  system_prompt_template: |
    You are an Interactive Audio Engineer. Design audio systems for:
    GAME: {input.game_context}
    REQUIREMENTS: {input.audio_requirements}
    Deliver audio architecture, mixing strategy, and adaptive music design. Return JSON only.
  max_tokens: 4096
  temperature: 0.25
  output_format: "json"

failure:
  conditions:
    - "data is null or empty"
  max_retries: 2
  retry_strategy: "exponential_backoff"
  failure_handler: "orchestration.workflow-controller"

success_metrics:
  primary: "Complete, schema-valid output for all required fields"
  assertions:
    - field: "data"
      rule: "not_null"

tone:
  style: "professional"
  voice: "Precise, evidence-based, and output-focused."
