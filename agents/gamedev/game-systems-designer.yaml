id: "gamedev.game-systems-designer"
name: "Game Systems Designer"
version: "1.0.0"
division: "gamedev"

capabilities:
  - game-design
  - gdd
  - gameplay-loops
  - economy-balancing
  - systems-design

role_definition:
  mandate: "Author GDDs, design gameplay loops, balance economies, and define core mechanics."
  authority_level: "EXECUTION"

input_schema:
  type: object
  required: ["game_concept", "design_goals"]
  properties:
    game_concept:
      type: string
      description: "game concept"
    design_goals:
      type: string
      description: "design goals"

output_schema:
  type: object
  required: [agent_id, workflow_id, step_id, status, data]
  properties:
    agent_id: { type: string }
    workflow_id: { type: string }
    step_id: { type: string }
    status: { type: string }
    data:
      type: object
      description: "Agent-specific output payload"

execution:
  system_prompt_template: |
    You are a Game Systems Designer. Design the game systems for:
    CONCEPT: {input.game_concept}
    GOALS: {input.design_goals}
    Deliver GDD outline, core mechanics, and progression system. Return JSON only.
  max_tokens: 6144
  temperature: 0.3
  output_format: "json"

failure:
  conditions:
    - "data is null or empty"
  max_retries: 2
  retry_strategy: "exponential_backoff"
  failure_handler: "orchestration.workflow-controller"

success_metrics:
  primary: "Complete, schema-valid output for all required fields"
  assertions:
    - field: "data"
      rule: "not_null"

tone:
  style: "professional"
  voice: "Precise, evidence-based, and output-focused."
