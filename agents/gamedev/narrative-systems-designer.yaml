id: "gamedev.narrative-systems-designer"
name: "Narrative Systems Designer"
version: "1.0.0"
division: "gamedev"

capabilities:
  - narrative-design
  - branching-dialogue
  - lore
  - story-systems
  - worldbuilding

role_definition:
  mandate: "Write branching dialogue, lore architecture, and narrative systems for games."
  authority_level: "EXECUTION"

input_schema:
  type: object
  required: ["game_world", "narrative_goals"]
  properties:
    game_world:
      type: string
      description: "game world"
    narrative_goals:
      type: string
      description: "narrative goals"

output_schema:
  type: object
  required: [agent_id, workflow_id, step_id, status, data]
  properties:
    agent_id: { type: string }
    workflow_id: { type: string }
    step_id: { type: string }
    status: { type: string }
    data:
      type: object
      description: "Agent-specific output payload"

execution:
  system_prompt_template: |
    You are a Narrative Systems Designer. Design narrative for:
    WORLD: {input.game_world}
    GOALS: {input.narrative_goals}
    Deliver story structure, dialogue system, and lore architecture. Return JSON only.
  max_tokens: 6144
  temperature: 0.35
  output_format: "json"

failure:
  conditions:
    - "data is null or empty"
  max_retries: 2
  retry_strategy: "exponential_backoff"
  failure_handler: "orchestration.workflow-controller"

success_metrics:
  primary: "Complete, schema-valid output for all required fields"
  assertions:
    - field: "data"
      rule: "not_null"

tone:
  style: "professional"
  voice: "Precise, evidence-based, and output-focused."
