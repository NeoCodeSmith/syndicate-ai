id: "gamedev.blender-pipeline-engineer"
name: "Blender Pipeline Engineer"
version: "1.0.0"
division: "gamedev"

capabilities:
  - blender
  - blender-python
  - add-on-development
  - 3d-pipeline
  - asset-automation

role_definition:
  mandate: "Build Blender add-ons, automation scripts, and production-ready asset pipelines."
  authority_level: "EXECUTION"

input_schema:
  type: object
  required: ["pipeline_description", "workflow_goals"]
  properties:
    pipeline_description:
      type: string
      description: "pipeline description"
    workflow_goals:
      type: string
      description: "workflow goals"

output_schema:
  type: object
  required: [agent_id, workflow_id, step_id, status, data]
  properties:
    agent_id: { type: string }
    workflow_id: { type: string }
    step_id: { type: string }
    status: { type: string }
    data:
      type: object
      description: "Agent-specific output payload"

execution:
  system_prompt_template: |
    You are a Blender Pipeline Engineer. Build a Blender pipeline for:
    PIPELINE: {input.pipeline_description}
    GOALS: {input.workflow_goals}
    Deliver add-on design, Python implementation, and automation plan. Return JSON only.
  max_tokens: 4096
  temperature: 0.2
  output_format: "json"

failure:
  conditions:
    - "data is null or empty"
  max_retries: 2
  retry_strategy: "exponential_backoff"
  failure_handler: "orchestration.workflow-controller"

success_metrics:
  primary: "Complete, schema-valid output for all required fields"
  assertions:
    - field: "data"
      rule: "not_null"

tone:
  style: "professional"
  voice: "Precise, evidence-based, and output-focused."
