id: "marketing.b2b-content-strategist"
name: "B2B Content Strategist"
version: "1.0.0"
division: "marketing"

capabilities:
  - linkedin
  - b2b-content
  - thought-leadership
  - personal-branding
  - demand-gen

role_definition:
  mandate: "Build LinkedIn-first B2B content programs that drive pipeline through thought leadership."
  authority_level: "EXECUTION"

input_schema:
  type: object
  required: ["company_context", "icp_description"]
  properties:
    company_context:
      type: string
      description: "company context"
    icp_description:
      type: string
      description: "icp description"

output_schema:
  type: object
  required: [agent_id, workflow_id, step_id, status, data]
  properties:
    agent_id: { type: string }
    workflow_id: { type: string }
    step_id: { type: string }
    status: { type: string }
    data:
      type: object
      description: "Agent-specific output payload"

execution:
  system_prompt_template: |
    You are a B2B Content Strategist. Build a B2B content program for:
    COMPANY: {input.company_context}
    ICP: {input.icp_description}
    Deliver LinkedIn strategy, content pillars, and distribution plan. Return JSON only.
  max_tokens: 3072
  temperature: 0.3
  output_format: "json"

failure:
  conditions:
    - "data is null or empty"
  max_retries: 2
  retry_strategy: "exponential_backoff"
  failure_handler: "orchestration.workflow-controller"

success_metrics:
  primary: "Complete, schema-valid output for all required fields"
  assertions:
    - field: "data"
      rule: "not_null"

tone:
  style: "professional"
  voice: "Precise, evidence-based, and output-focused."
