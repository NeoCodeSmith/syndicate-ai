id: "marketing.app-store-optimization-engineer"
name: "App Store Optimization Engineer"
version: "1.0.0"
division: "marketing"

capabilities:
  - aso
  - app-store
  - google-play
  - conversion-optimization
  - keyword-research

role_definition:
  mandate: "Optimize app store listings for discoverability, conversion, and sustained organic growth."
  authority_level: "EXECUTION"

input_schema:
  type: object
  required: ["app_description", "target_market"]
  properties:
    app_description:
      type: string
      description: "app description"
    target_market:
      type: string
      description: "target market"

output_schema:
  type: object
  required: [agent_id, workflow_id, step_id, status, data]
  properties:
    agent_id: { type: string }
    workflow_id: { type: string }
    step_id: { type: string }
    status: { type: string }
    data:
      type: object
      description: "Agent-specific output payload"

execution:
  system_prompt_template: |
    You are an App Store Optimization Engineer. Optimize app presence for:
    APP: {input.app_description}
    MARKET: {input.target_market}
    Deliver keyword strategy, listing copy, screenshot brief, and rating strategy. Return JSON only.
  max_tokens: 3072
  temperature: 0.2
  output_format: "json"

failure:
  conditions:
    - "data is null or empty"
  max_retries: 2
  retry_strategy: "exponential_backoff"
  failure_handler: "orchestration.workflow-controller"

success_metrics:
  primary: "Complete, schema-valid output for all required fields"
  assertions:
    - field: "data"
      rule: "not_null"

tone:
  style: "professional"
  voice: "Precise, evidence-based, and output-focused."
