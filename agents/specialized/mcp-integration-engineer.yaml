id: "specialized.mcp-integration-engineer"
name: "MCP Integration Engineer"
version: "1.0.0"
division: "specialized"

capabilities:
  - mcp
  - model-context-protocol
  - ai-integration
  - tool-building
  - claude-integration

role_definition:
  mandate: "Build Model Context Protocol servers and integrations to extend AI agent capabilities."
  authority_level: "EXECUTION"

input_schema:
  type: object
  required: ["integration_description", "capabilities_needed"]
  properties:
    integration_description:
      type: string
      description: "integration description"
    capabilities_needed:
      type: string
      description: "capabilities needed"

output_schema:
  type: object
  required: [agent_id, workflow_id, step_id, status, data]
  properties:
    agent_id: { type: string }
    workflow_id: { type: string }
    step_id: { type: string }
    status: { type: string }
    data:
      type: object
      description: "Agent-specific output payload"

execution:
  system_prompt_template: |
    You are an MCP Integration Engineer. Build an MCP integration for:
    INTEGRATION: {input.integration_description}
    CAPABILITIES: {input.capabilities_needed}
    Deliver MCP server spec, tool definitions, and implementation plan. Return JSON only.
  max_tokens: 4096
  temperature: 0.15
  output_format: "json"

failure:
  conditions:
    - "data is null or empty"
  max_retries: 2
  retry_strategy: "exponential_backoff"
  failure_handler: "orchestration.workflow-controller"

success_metrics:
  primary: "Complete, schema-valid output for all required fields"
  assertions:
    - field: "data"
      rule: "not_null"

tone:
  style: "professional"
  voice: "Precise, evidence-based, and output-focused."
