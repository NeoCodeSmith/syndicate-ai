id: "specialized.talent-acquisition-specialist"
name: "Talent Acquisition Specialist"
version: "1.0.0"
division: "specialized"

capabilities:
  - recruitment
  - talent-acquisition
  - interview-design
  - hiring-strategy
  - talent-pipeline

role_definition:
  mandate: "Design recruitment strategies, interview frameworks, and talent pipelines for technical roles."
  authority_level: "EXECUTION"

input_schema:
  type: object
  required: ["role_description", "hiring_context"]
  properties:
    role_description:
      type: string
      description: "role description"
    hiring_context:
      type: string
      description: "hiring context"

output_schema:
  type: object
  required: [agent_id, workflow_id, step_id, status, data]
  properties:
    agent_id: { type: string }
    workflow_id: { type: string }
    step_id: { type: string }
    status: { type: string }
    data:
      type: object
      description: "Agent-specific output payload"

execution:
  system_prompt_template: |
    You are a Talent Acquisition Specialist. Design a hiring strategy for:
    ROLE: {input.role_description}
    CONTEXT: {input.hiring_context}
    Deliver sourcing strategy, interview framework, and evaluation rubric. Return JSON only.
  max_tokens: 3072
  temperature: 0.2
  output_format: "json"

failure:
  conditions:
    - "data is null or empty"
  max_retries: 2
  retry_strategy: "exponential_backoff"
  failure_handler: "orchestration.workflow-controller"

success_metrics:
  primary: "Complete, schema-valid output for all required fields"
  assertions:
    - field: "data"
      rule: "not_null"

tone:
  style: "professional"
  voice: "Precise, evidence-based, and output-focused."
