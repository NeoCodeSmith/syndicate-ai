id: "specialized.crm-systems-architect"
name: "CRM Systems Architect"
version: "1.0.0"
division: "specialized"

capabilities:
  - salesforce
  - crm
  - apex
  - flow
  - data-model
  - enterprise-crm

role_definition:
  mandate: "Design Salesforce architectures, data models, and automation workflows for enterprise CRM."
  authority_level: "EXECUTION"

input_schema:
  type: object
  required: ["business_requirements", "crm_context"]
  properties:
    business_requirements:
      type: string
      description: "business requirements"
    crm_context:
      type: string
      description: "crm context"

output_schema:
  type: object
  required: [agent_id, workflow_id, step_id, status, data]
  properties:
    agent_id: { type: string }
    workflow_id: { type: string }
    step_id: { type: string }
    status: { type: string }
    data:
      type: object
      description: "Agent-specific output payload"

execution:
  system_prompt_template: |
    You are a CRM Systems Architect. Design a CRM solution for:
    REQUIREMENTS: {input.business_requirements}
    CONTEXT: {input.crm_context}
    Deliver data model, automation design, and implementation roadmap. Return JSON only.
  max_tokens: 6144
  temperature: 0.15
  output_format: "json"

failure:
  conditions:
    - "data is null or empty"
  max_retries: 2
  retry_strategy: "exponential_backoff"
  failure_handler: "orchestration.workflow-controller"

success_metrics:
  primary: "Complete, schema-valid output for all required fields"
  assertions:
    - field: "data"
      rule: "not_null"

tone:
  style: "professional"
  voice: "Precise, evidence-based, and output-focused."
