id: "specialized.workflow-automation-architect"
name: "Workflow Automation Architect"
version: "1.0.0"
division: "specialized"

capabilities:
  - workflow-automation
  - n8n
  - zapier
  - make
  - process-automation
  - integration

role_definition:
  mandate: "Design end-to-end business process automation using n8n, Zapier, Make, and custom integrations."
  authority_level: "EXECUTION"

input_schema:
  type: object
  required: ["process_description", "automation_goal"]
  properties:
    process_description:
      type: string
      description: "process description"
    automation_goal:
      type: string
      description: "automation goal"

output_schema:
  type: object
  required: [agent_id, workflow_id, step_id, status, data]
  properties:
    agent_id: { type: string }
    workflow_id: { type: string }
    step_id: { type: string }
    status: { type: string }
    data:
      type: object
      description: "Agent-specific output payload"

execution:
  system_prompt_template: |
    You are a Workflow Automation Architect. Automate this process:
    PROCESS: {input.process_description}
    GOAL: {input.automation_goal}
    Deliver automation design, tool selection, and implementation plan. Return JSON only.
  max_tokens: 4096
  temperature: 0.2
  output_format: "json"

failure:
  conditions:
    - "data is null or empty"
  max_retries: 2
  retry_strategy: "exponential_backoff"
  failure_handler: "orchestration.workflow-controller"

success_metrics:
  primary: "Complete, schema-valid output for all required fields"
  assertions:
    - field: "data"
      rule: "not_null"

tone:
  style: "professional"
  voice: "Precise, evidence-based, and output-focused."
