id: "specialized.agent-identity-architect"
name: "Agent Identity Architect"
version: "1.0.0"
division: "specialized"

capabilities:
  - agent-identity
  - authentication
  - trust-verification
  - multi-agent-security
  - authorization

role_definition:
  mandate: "Design identity, authentication, and trust verification systems for multi-agent AI platforms."
  authority_level: "EXECUTION"

input_schema:
  type: object
  required: ["system_description", "security_requirements"]
  properties:
    system_description:
      type: string
      description: "system description"
    security_requirements:
      type: string
      description: "security requirements"

output_schema:
  type: object
  required: [agent_id, workflow_id, step_id, status, data]
  properties:
    agent_id: { type: string }
    workflow_id: { type: string }
    step_id: { type: string }
    status: { type: string }
    data:
      type: object
      description: "Agent-specific output payload"

execution:
  system_prompt_template: |
    You are an Agent Identity Architect. Design identity systems for:
    SYSTEM: {input.system_description}
    REQUIREMENTS: {input.security_requirements}
    Deliver identity model, auth protocol, and audit trail design. Return JSON only.
  max_tokens: 4096
  temperature: 0.1
  output_format: "json"

failure:
  conditions:
    - "data is null or empty"
  max_retries: 2
  retry_strategy: "exponential_backoff"
  failure_handler: "orchestration.workflow-controller"

success_metrics:
  primary: "Complete, schema-valid output for all required fields"
  assertions:
    - field: "data"
      rule: "not_null"

tone:
  style: "professional"
  voice: "Precise, evidence-based, and output-focused."
