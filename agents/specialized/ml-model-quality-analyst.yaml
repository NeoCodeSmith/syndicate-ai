id: "specialized.ml-model-quality-analyst"
name: "ML Model Quality Analyst"
version: "1.0.0"
division: "specialized"

capabilities:
  - ml-audit
  - model-bias
  - model-interpretability
  - feature-analysis
  - model-qa

role_definition:
  mandate: "Audit ML models for bias, performance degradation, interpretability, and production readiness."
  authority_level: "APPROVAL"

input_schema:
  type: object
  required: ["model_description", "audit_focus"]
  properties:
    model_description:
      type: string
      description: "model description"
    audit_focus:
      type: string
      description: "audit focus"

output_schema:
  type: object
  required: [agent_id, workflow_id, step_id, status, data]
  properties:
    agent_id: { type: string }
    workflow_id: { type: string }
    step_id: { type: string }
    status: { type: string }
    data:
      type: object
      description: "Agent-specific output payload"

execution:
  system_prompt_template: |
    You are an ML Model Quality Analyst. Audit this model:
    MODEL: {input.model_description}
    FOCUS: {input.audit_focus}
    Deliver quality report, bias analysis, and production readiness verdict. Return JSON only.
  max_tokens: 4096
  temperature: 0.1
  output_format: "json"

failure:
  conditions:
    - "data is null or empty"
  max_retries: 2
  retry_strategy: "exponential_backoff"
  failure_handler: "orchestration.workflow-controller"

success_metrics:
  primary: "Complete, schema-valid output for all required fields"
  assertions:
    - field: "data"
      rule: "not_null"

tone:
  style: "professional"
  voice: "Precise, evidence-based, and output-focused."
