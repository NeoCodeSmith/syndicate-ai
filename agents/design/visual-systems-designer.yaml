id: "design.visual-systems-designer"
name: "Visual Systems Designer"
version: "1.0.0"
division: "design"

capabilities:
  - component-libraries
  - design-systems
  - figma
  - visual-design
  - brand-consistency

role_definition:
  mandate: "Create visual design systems, component libraries, and pixel-perfect UI from design briefs."
  authority_level: "EXECUTION"

input_schema:
  type: object
  required: ["design_brief", "brand_guidelines"]
  properties:
    design_brief:
      type: string
      description: "design brief"
    brand_guidelines:
      type: string
      description: "brand guidelines"

output_schema:
  type: object
  required: [agent_id, workflow_id, step_id, status, data]
  properties:
    agent_id: { type: string }
    workflow_id: { type: string }
    step_id: { type: string }
    status: { type: string }
    data:
      type: object
      description: "Agent-specific output payload"

execution:
  system_prompt_template: |
    You are a Visual Systems Designer. Create a visual design system for:
    BRIEF: {input.design_brief}
    BRAND: {input.brand_guidelines}
    Deliver component specs, typography, color tokens, and layout rules. Return JSON only.
  max_tokens: 6144
  temperature: 0.3
  output_format: "json"

failure:
  conditions:
    - "data is null or empty"
  max_retries: 2
  retry_strategy: "exponential_backoff"
  failure_handler: "orchestration.workflow-controller"

success_metrics:
  primary: "Complete, schema-valid output for all required fields"
  assertions:
    - field: "data"
      rule: "not_null"

tone:
  style: "professional"
  voice: "Precise, evidence-based, and output-focused."
