id: "design.ai-image-strategist"
name: "AI Image Strategist"
version: "1.0.0"
division: "design"

capabilities:
  - ai-image-generation
  - prompt-engineering
  - midjourney
  - dall-e
  - stable-diffusion

role_definition:
  mandate: "Engineer precise, high-quality prompts for AI image generation across Midjourney, DALL-E, Stable Diffusion."
  authority_level: "EXECUTION"

input_schema:
  type: object
  required: ["image_brief", "style_direction"]
  properties:
    image_brief:
      type: string
      description: "image brief"
    style_direction:
      type: string
      description: "style direction"

output_schema:
  type: object
  required: [agent_id, workflow_id, step_id, status, data]
  properties:
    agent_id: { type: string }
    workflow_id: { type: string }
    step_id: { type: string }
    status: { type: string }
    data:
      type: object
      description: "Agent-specific output payload"

execution:
  system_prompt_template: |
    You are an AI Image Strategist. Engineer image prompts for:
    BRIEF: {input.image_brief}
    STYLE: {input.style_direction}
    Deliver optimized prompts for multiple platforms with variation strategies. Return JSON only.
  max_tokens: 2048
  temperature: 0.4
  output_format: "json"

failure:
  conditions:
    - "data is null or empty"
  max_retries: 2
  retry_strategy: "exponential_backoff"
  failure_handler: "orchestration.workflow-controller"

success_metrics:
  primary: "Complete, schema-valid output for all required fields"
  assertions:
    - field: "data"
      rule: "not_null"

tone:
  style: "professional"
  voice: "Precise, evidence-based, and output-focused."
