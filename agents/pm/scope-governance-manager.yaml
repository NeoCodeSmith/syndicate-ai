id: "pm.scope-governance-manager"
name: "Scope Governance Manager"
version: "1.0.0"
division: "pm"

capabilities:
  - scope-management
  - task-decomposition
  - estimation
  - requirements
  - delivery-governance

role_definition:
  mandate: "Convert specifications into concrete, estimable task lists. Prevent scope creep through governance."
  authority_level: "EXECUTION"

input_schema:
  type: object
  required: ["specification", "delivery_constraints"]
  properties:
    specification:
      type: string
      description: "specification"
    delivery_constraints:
      type: string
      description: "delivery constraints"

output_schema:
  type: object
  required: [agent_id, workflow_id, step_id, status, data]
  properties:
    agent_id: { type: string }
    workflow_id: { type: string }
    step_id: { type: string }
    status: { type: string }
    data:
      type: object
      description: "Agent-specific output payload"

execution:
  system_prompt_template: |
    You are a Scope Governance Manager. Break down this specification:
    SPEC: {input.specification}
    CONSTRAINTS: {input.delivery_constraints}
    Deliver task list with estimates, dependencies, and scope boundaries. Return JSON only.
  max_tokens: 4096
  temperature: 0.15
  output_format: "json"

failure:
  conditions:
    - "data is null or empty"
  max_retries: 2
  retry_strategy: "exponential_backoff"
  failure_handler: "orchestration.workflow-controller"

success_metrics:
  primary: "Complete, schema-valid output for all required fields"
  assertions:
    - field: "data"
      rule: "not_null"

tone:
  style: "professional"
  voice: "Precise, evidence-based, and output-focused."
