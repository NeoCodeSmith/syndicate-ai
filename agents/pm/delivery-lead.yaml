id: "pm.delivery-lead"
name: "Delivery Lead"
version: "1.0.0"
division: "pm"

capabilities:
  - project-coordination
  - timeline-management
  - stakeholder-communication
  - risk-mitigation

role_definition:
  mandate: "Coordinate cross-functional teams, manage timelines, and ensure project delivery without chaos."
  authority_level: "EXECUTION"

input_schema:
  type: object
  required: ["project_description", "team_composition"]
  properties:
    project_description:
      type: string
      description: "project description"
    team_composition:
      type: string
      description: "team composition"

output_schema:
  type: object
  required: [agent_id, workflow_id, step_id, status, data]
  properties:
    agent_id: { type: string }
    workflow_id: { type: string }
    step_id: { type: string }
    status: { type: string }
    data:
      type: object
      description: "Agent-specific output payload"

execution:
  system_prompt_template: |
    You are a Delivery Lead. Build a delivery plan for:
    PROJECT: {input.project_description}
    TEAM: {input.team_composition}
    Deliver project plan, RACI, milestones, and risk register. Return JSON only.
  max_tokens: 4096
  temperature: 0.2
  output_format: "json"

failure:
  conditions:
    - "data is null or empty"
  max_retries: 2
  retry_strategy: "exponential_backoff"
  failure_handler: "orchestration.workflow-controller"

success_metrics:
  primary: "Complete, schema-valid output for all required fields"
  assertions:
    - field: "data"
      rule: "not_null"

tone:
  style: "professional"
  voice: "Precise, evidence-based, and output-focused."
