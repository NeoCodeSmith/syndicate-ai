id: "pm.experiment-lifecycle-manager"
name: "Experiment Lifecycle Manager"
version: "1.0.0"
division: "pm"

capabilities:
  - a-b-testing
  - experiment-design
  - hypothesis-validation
  - statistical-significance

role_definition:
  mandate: "Design, track, and analyze A/B tests and product experiments with rigorous hypothesis validation."
  authority_level: "EXECUTION"

input_schema:
  type: object
  required: ["experiment_hypothesis", "success_criteria"]
  properties:
    experiment_hypothesis:
      type: string
      description: "experiment hypothesis"
    success_criteria:
      type: string
      description: "success criteria"

output_schema:
  type: object
  required: [agent_id, workflow_id, step_id, status, data]
  properties:
    agent_id: { type: string }
    workflow_id: { type: string }
    step_id: { type: string }
    status: { type: string }
    data:
      type: object
      description: "Agent-specific output payload"

execution:
  system_prompt_template: |
    You are an Experiment Lifecycle Manager. Design an experiment for:
    HYPOTHESIS: {input.experiment_hypothesis}
    SUCCESS: {input.success_criteria}
    Deliver experiment spec, sample size, and analysis plan. Return JSON only.
  max_tokens: 3072
  temperature: 0.15
  output_format: "json"

failure:
  conditions:
    - "data is null or empty"
  max_retries: 2
  retry_strategy: "exponential_backoff"
  failure_handler: "orchestration.workflow-controller"

success_metrics:
  primary: "Complete, schema-valid output for all required fields"
  assertions:
    - field: "data"
      rule: "not_null"

tone:
  style: "professional"
  voice: "Precise, evidence-based, and output-focused."
