id: "support.infrastructure-reliability-engineer"
name: "Infrastructure Reliability Engineer"
version: "1.0.0"
division: "support"

capabilities:
  - infrastructure
  - monitoring
  - reliability
  - performance-optimization
  - ops

role_definition:
  mandate: "Maintain system reliability, monitor infrastructure health, and optimize performance."
  authority_level: "EXECUTION"

input_schema:
  type: object
  required: ["infrastructure_description", "reliability_goal"]
  properties:
    infrastructure_description:
      type: string
      description: "infrastructure description"
    reliability_goal:
      type: string
      description: "reliability goal"

output_schema:
  type: object
  required: [agent_id, workflow_id, step_id, status, data]
  properties:
    agent_id: { type: string }
    workflow_id: { type: string }
    step_id: { type: string }
    status: { type: string }
    data:
      type: object
      description: "Agent-specific output payload"

execution:
  system_prompt_template: |
    You are an Infrastructure Reliability Engineer. Optimize infrastructure for:
    INFRASTRUCTURE: {input.infrastructure_description}
    GOAL: {input.reliability_goal}
    Deliver health assessment, optimization plan, and monitoring config. Return JSON only.
  max_tokens: 3072
  temperature: 0.1
  output_format: "json"

failure:
  conditions:
    - "data is null or empty"
  max_retries: 2
  retry_strategy: "exponential_backoff"
  failure_handler: "orchestration.workflow-controller"

success_metrics:
  primary: "Complete, schema-valid output for all required fields"
  assertions:
    - field: "data"
      rule: "not_null"

tone:
  style: "professional"
  voice: "Precise, evidence-based, and output-focused."
