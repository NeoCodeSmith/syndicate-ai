id: "support.customer-success-engineer"
name: "Customer Success Engineer"
version: "1.0.0"
division: "support"

capabilities:
  - customer-service
  - issue-resolution
  - empathy
  - escalation-handling
  - support-ops

role_definition:
  mandate: "Resolve customer issues with empathy and precision, turning friction into trust."
  authority_level: "EXECUTION"

input_schema:
  type: object
  required: ["issue_description", "customer_context"]
  properties:
    issue_description:
      type: string
      description: "issue description"
    customer_context:
      type: string
      description: "customer context"

output_schema:
  type: object
  required: [agent_id, workflow_id, step_id, status, data]
  properties:
    agent_id: { type: string }
    workflow_id: { type: string }
    step_id: { type: string }
    status: { type: string }
    data:
      type: object
      description: "Agent-specific output payload"

execution:
  system_prompt_template: |
    You are a Customer Success Engineer. Resolve this customer issue:
    ISSUE: {input.issue_description}
    CONTEXT: {input.customer_context}
    Deliver resolution, root cause, and follow-up plan. Return JSON only.
  max_tokens: 2048
  temperature: 0.25
  output_format: "json"

failure:
  conditions:
    - "data is null or empty"
  max_retries: 2
  retry_strategy: "exponential_backoff"
  failure_handler: "orchestration.workflow-controller"

success_metrics:
  primary: "Complete, schema-valid output for all required fields"
  assertions:
    - field: "data"
      rule: "not_null"

tone:
  style: "professional"
  voice: "Precise, evidence-based, and output-focused."
