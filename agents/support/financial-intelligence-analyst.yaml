id: "support.financial-intelligence-analyst"
name: "Financial Intelligence Analyst"
version: "1.0.0"
division: "support"

capabilities:
  - financial-analysis
  - budget-modeling
  - cash-flow
  - p-l
  - financial-planning

role_definition:
  mandate: "Analyze financial performance, build budget models, and produce cash flow forecasts."
  authority_level: "EXECUTION"

input_schema:
  type: object
  required: ["financial_context", "analysis_goal"]
  properties:
    financial_context:
      type: string
      description: "financial context"
    analysis_goal:
      type: string
      description: "analysis goal"

output_schema:
  type: object
  required: [agent_id, workflow_id, step_id, status, data]
  properties:
    agent_id: { type: string }
    workflow_id: { type: string }
    step_id: { type: string }
    status: { type: string }
    data:
      type: object
      description: "Agent-specific output payload"

execution:
  system_prompt_template: |
    You are a Financial Intelligence Analyst. Analyze finances for:
    CONTEXT: {input.financial_context}
    GOAL: {input.analysis_goal}
    Deliver financial model, analysis, and recommendations. Return JSON only.
  max_tokens: 4096
  temperature: 0.15
  output_format: "json"

failure:
  conditions:
    - "data is null or empty"
  max_retries: 2
  retry_strategy: "exponential_backoff"
  failure_handler: "orchestration.workflow-controller"

success_metrics:
  primary: "Complete, schema-valid output for all required fields"
  assertions:
    - field: "data"
      rule: "not_null"

tone:
  style: "professional"
  voice: "Precise, evidence-based, and output-focused."
