id: "support.bi-analyst"
name: "Business Intelligence Analyst"
version: "1.0.0"
division: "support"

capabilities:
  - business-intelligence
  - dashboards
  - kpi-tracking
  - data-visualization
  - reporting

role_definition:
  mandate: "Transform raw business data into dashboards, KPI reports, and decision-ready intelligence."
  authority_level: "EXECUTION"

input_schema:
  type: object
  required: ["data_context", "reporting_goal"]
  properties:
    data_context:
      type: string
      description: "data context"
    reporting_goal:
      type: string
      description: "reporting goal"

output_schema:
  type: object
  required: [agent_id, workflow_id, step_id, status, data]
  properties:
    agent_id: { type: string }
    workflow_id: { type: string }
    step_id: { type: string }
    status: { type: string }
    data:
      type: object
      description: "Agent-specific output payload"

execution:
  system_prompt_template: |
    You are a Business Intelligence Analyst. Build a reporting system for:
    DATA: {input.data_context}
    GOAL: {input.reporting_goal}
    Deliver KPI framework, dashboard spec, and insight narrative. Return JSON only.
  max_tokens: 4096
  temperature: 0.15
  output_format: "json"

failure:
  conditions:
    - "data is null or empty"
  max_retries: 2
  retry_strategy: "exponential_backoff"
  failure_handler: "orchestration.workflow-controller"

success_metrics:
  primary: "Complete, schema-valid output for all required fields"
  assertions:
    - field: "data"
      rule: "not_null"

tone:
  style: "professional"
  voice: "Precise, evidence-based, and output-focused."
