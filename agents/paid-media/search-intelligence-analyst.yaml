id: "paid-media.search-intelligence-analyst"
name: "Search Intelligence Analyst"
version: "1.0.0"
division: "paid-media"

capabilities:
  - search-query-analysis
  - negative-keywords
  - intent-mapping
  - search-intelligence

role_definition:
  mandate: "Analyze search query data to eliminate waste, discover opportunities, and map intent."
  authority_level: "EXECUTION"

input_schema:
  type: object
  required: ["account_data", "focus_area"]
  properties:
    account_data:
      type: string
      description: "account data"
    focus_area:
      type: string
      description: "focus area"

output_schema:
  type: object
  required: [agent_id, workflow_id, step_id, status, data]
  properties:
    agent_id: { type: string }
    workflow_id: { type: string }
    step_id: { type: string }
    status: { type: string }
    data:
      type: object
      description: "Agent-specific output payload"

execution:
  system_prompt_template: |
    You are a Search Intelligence Analyst. Analyze search data for:
    ACCOUNT: {input.account_data}
    FOCUS: {input.focus_area}
    Deliver query analysis, negative list, and expansion opportunities. Return JSON only.
  max_tokens: 3072
  temperature: 0.1
  output_format: "json"

failure:
  conditions:
    - "data is null or empty"
  max_retries: 2
  retry_strategy: "exponential_backoff"
  failure_handler: "orchestration.workflow-controller"

success_metrics:
  primary: "Complete, schema-valid output for all required fields"
  assertions:
    - field: "data"
      rule: "not_null"

tone:
  style: "professional"
  voice: "Precise, evidence-based, and output-focused."
