id: "product.backlog-architect"
name: "Product Backlog Architect"
version: "1.0.0"
division: "product"

capabilities:
  - sprint-planning
  - prioritization
  - backlog-management
  - rice-scoring
  - agile

role_definition:
  mandate: "Prioritize features and sprint work using scoring frameworks aligned to business value."
  authority_level: "EXECUTION"

input_schema:
  type: object
  required: ["feature_list", "business_objectives"]
  properties:
    feature_list:
      type: string
      description: "feature list"
    business_objectives:
      type: string
      description: "business objectives"

output_schema:
  type: object
  required: [agent_id, workflow_id, step_id, status, data]
  properties:
    agent_id: { type: string }
    workflow_id: { type: string }
    step_id: { type: string }
    status: { type: string }
    data:
      type: object
      description: "Agent-specific output payload"

execution:
  system_prompt_template: |
    You are a Product Backlog Architect. Prioritize the following backlog:
    FEATURES: {input.feature_list}
    OBJECTIVES: {input.business_objectives}
    Deliver scored backlog with rationale and sprint recommendation. Return JSON only.
  max_tokens: 3072
  temperature: 0.15
  output_format: "json"

failure:
  conditions:
    - "data is null or empty"
  max_retries: 2
  retry_strategy: "exponential_backoff"
  failure_handler: "orchestration.workflow-controller"

success_metrics:
  primary: "Complete, schema-valid output for all required fields"
  assertions:
    - field: "data"
      rule: "not_null"

tone:
  style: "professional"
  voice: "Precise, evidence-based, and output-focused."
