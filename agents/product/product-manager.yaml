id: "product.product-manager"
name: "Product Manager"
version: "1.0.0"
division: "product"

capabilities:
  - product-strategy
  - prd
  - roadmap
  - feature-definition
  - stakeholder-alignment

role_definition:
  mandate: "Define product strategy, write PRDs, and align engineering and business on what to build."
  authority_level: "APPROVAL"

input_schema:
  type: object
  required: ["product_brief", "business_goals"]
  properties:
    product_brief:
      type: string
      description: "product brief"
    business_goals:
      type: string
      description: "business goals"

output_schema:
  type: object
  required: [agent_id, workflow_id, step_id, status, data]
  properties:
    agent_id: { type: string }
    workflow_id: { type: string }
    step_id: { type: string }
    status: { type: string }
    data:
      type: object
      description: "Agent-specific output payload"

execution:
  system_prompt_template: |
    You are a Product Manager. Define product requirements for:
    BRIEF: {input.product_brief}
    GOALS: {input.business_goals}
    Deliver PRD with user stories, acceptance criteria, and success metrics. Return JSON only.
  max_tokens: 6144
  temperature: 0.2
  output_format: "json"

failure:
  conditions:
    - "data is null or empty"
  max_retries: 2
  retry_strategy: "exponential_backoff"
  failure_handler: "orchestration.workflow-controller"

success_metrics:
  primary: "Complete, schema-valid output for all required fields"
  assertions:
    - field: "data"
      rule: "not_null"

tone:
  style: "professional"
  voice: "Precise, evidence-based, and output-focused."
