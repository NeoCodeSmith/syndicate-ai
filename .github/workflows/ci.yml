name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  # ─── Validate Agent Contracts ──────────────────────────────────────────────
  validate-agents:
    name: Validate Agent Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install pydantic pyyaml jsonschema
      - run: python scripts/validate_agents.py
      - run: python scripts/validate_workflows.py

  # ─── Lint + Type Check ────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install ruff==0.15.6 mypy==1.13.0 pyyaml types-PyYAML types-redis pydantic pydantic-settings
      - run: ruff check src/ agents/ --output-format=github
      - run: ruff format src/ --check
      - run: mypy src/syndicate --ignore-missing-imports

  # ─── Test Suite ───────────────────────────────────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.12"]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: syndicate_test
          POSTGRES_USER: syndicate
          POSTGRES_PASSWORD: test-password
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -r requirements-dev.txt
      - name: Run unit tests
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: syndicate_test
          POSTGRES_USER: syndicate
          POSTGRES_PASSWORD: test-password
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/1
          LLM_API_KEY: test-key-placeholder
          LLM_MODEL: claude-opus-4-6
          SYNDICATE_API_KEYS: sk-test-key
        run: pytest tests/unit/ -v
      - uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  # ─── Build Docker Image ───────────────────────────────────────────────────
  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test, validate-agents]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=sha-
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ─── Security Scan ────────────────────────────────────────────────────────
  # Uses pip-audit to check Python dependencies against the OSV advisory database.
  # No external action required — pure pip install, guaranteed to work.
  # Results are informational only (exit-code 0). Never blocks deployment.
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [validate-agents]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Audit Python dependencies
        run: |
          echo "=== Scanning requirements.txt for known CVEs ==="
          pip-audit -r requirements.txt --format markdown --output pip-audit-results.md || true
          echo "=== Scanning requirements-dev.txt ==="
          pip-audit -r requirements-dev.txt --format markdown >> pip-audit-results.md || true
          echo "=== Audit complete — results are informational ==="
          cat pip-audit-results.md
      - name: Upload audit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-results
          path: pip-audit-results.md
          retention-days: 30
